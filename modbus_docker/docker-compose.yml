services:
  # ---------------------------------------------------------
  # SCADA Masters (The Client polling the network)
  # ---------------------------------------------------------
  scada_master:
    build:
      context: .
    command: ['/app/scripts/async_scada.py', '--target', '10.30.0.3:5020', '--count', '2']
    container_name: scada1
    networks:
      grid_macvlan:
        ipv4_address: 10.30.0.8

  scada2:
    build:
      context: .
    command: ['/app/scripts/async_scada.py', '--target', '10.30.0.3:5020', '--count', '2']
    container_name: scada2
    networks:
      grid_macvlan:
        ipv4_address: 10.30.0.17

  scada3:
    build:
      context: .
    command: ['/app/scripts/async_scada.py', '--target', '10.30.0.5:5020', '--count', '2']
    container_name: scada3
    networks:
      grid_macvlan:
        ipv4_address: 10.30.0.32

  scada4:
    build:
      context: .
    command: ['/app/scripts/async_scada.py', '--target', '10.30.0.5:5020', '--count', '2']
    container_name: scada4
    networks:
      grid_macvlan:
        ipv4_address: 10.30.0.27

  # ---------------------------------------------------------
  # Historian Loggers
  # ---------------------------------------------------------
  historian_logger:
    build:
      context: .
    command: ['/app/scripts/historian_logger.py', '--target', '10.30.0.3:5020']
    container_name: historian_logger1
    networks:
      grid_macvlan:
        ipv4_address: 10.30.0.10

  historian_logger2:
    build:
      context: .
    command: ['/app/scripts/historian_logger.py', '--target', '10.30.0.3:5020']
    container_name: historian_logger2
    networks:
      grid_macvlan:
        ipv4_address: 10.30.0.33

  historian_logger3:
    build:
      context: .
    command: ['/app/scripts/historian_logger.py', '--target', '10.30.0.5:5020']
    container_name: historian_logger3
    networks:
      grid_macvlan:
        ipv4_address: 10.30.0.49

  historian_logger4:
    build:
      context: .
    command: ['/app/scripts/historian_logger.py', '--target', '10.30.0.5:5020']
    container_name: historian_logger4
    networks:
      grid_macvlan:
        ipv4_address: 10.30.0.22

  # ---------------------------------------------------------
  # Benign “utility” clients (10.30.0.100–150): operator HMI, relay-style polls,
  # slow EMS FC16 schedules — broader baseline than SCADA/historian alone.
  # ---------------------------------------------------------
  operator_hmi_plc1:
    build:
      context: .
    command: ['/app/scripts/operator_hmi.py', '--target', '10.30.0.3:5020', '--unit', '0']
    container_name: operator_hmi_plc1
    restart: unless-stopped
    networks:
      grid_macvlan:
        ipv4_address: 10.30.0.100

  operator_hmi_plc2:
    build:
      context: .
    command: ['/app/scripts/operator_hmi.py', '--target', '10.30.0.5:5020', '--unit', '0']
    container_name: operator_hmi_plc2
    restart: unless-stopped
    networks:
      grid_macvlan:
        ipv4_address: 10.30.0.101

  benign_relay_plc1:
    build:
      context: .
    command:
      [
        '/app/scripts/benign_relay_poller.py',
        '--target',
        '10.30.0.3:5020',
        '--unit',
        '0',
        '--min-interval',
        '40',
        '--max-interval',
        '110',
      ]
    container_name: benign_relay_plc1
    restart: unless-stopped
    networks:
      grid_macvlan:
        ipv4_address: 10.30.0.102

  benign_relay_plc2:
    build:
      context: .
    command:
      [
        '/app/scripts/benign_relay_poller.py',
        '--target',
        '10.30.0.5:5020',
        '--unit',
        '0',
        '--min-interval',
        '45',
        '--max-interval',
        '130',
      ]
    container_name: benign_relay_plc2
    restart: unless-stopped
    networks:
      grid_macvlan:
        ipv4_address: 10.30.0.103

  benign_ems_plc1:
    build:
      context: .
    command:
      [
        '/app/scripts/benign_ems_scheduler.py',
        '--target',
        '10.30.0.3:5020',
        '--unit',
        '0',
        '--min-interval',
        '150',
        '--max-interval',
        '320',
      ]
    container_name: benign_ems_plc1
    restart: unless-stopped
    networks:
      grid_macvlan:
        ipv4_address: 10.30.0.104

  benign_ems_plc2:
    build:
      context: .
    command:
      [
        '/app/scripts/benign_ems_scheduler.py',
        '--target',
        '10.30.0.5:5020',
        '--unit',
        '0',
        '--min-interval',
        '180',
        '--max-interval',
        '400',
      ]
    container_name: benign_ems_plc2
    restart: unless-stopped
    networks:
      grid_macvlan:
        ipv4_address: 10.30.0.105

  # ---------------------------------------------------------
  # IDS dataset: multiple orchestrators = distinct source IPs in PCAP.
  # With IDS_BENIGN_EP_* enabled, orchestrators also generate benign episodes
  # during gaps so they don't only appear during attacks.
  # ---------------------------------------------------------
  ids_orchestrator:
    build:
      context: .
    command: ['/app/scripts/ids_dataset_orchestrator.py', '--seed', '101']
    container_name: ids_dataset_orch1
    hostname: ids-orch-1
    volumes:
      - ./dataset_out:/data
    environment:
      IDS_EVENTS_OUT: /data/ids_events_orch1.jsonl
      IDS_SOURCE_IP: 10.30.0.11
      IDS_ATTACKER_ID: orch1
      IDS_ORCH_PLC1: 10.30.0.3:5020
      IDS_ORCH_PLC2: 10.30.0.5:5020
      IDS_MODBUS_UNIT: "0"
      IDS_MIN_GAP_SEC: "45"
      IDS_MAX_GAP_SEC: "240"
      IDS_ATTACK_PROB: "0.60"
      IDS_BENIGN_EXTRA_MAX: "240"
      IDS_BENIGN_EP_PROB: "0.60"
      IDS_BENIGN_EP_MAX_PER_GAP: "1"
    restart: unless-stopped
    networks:
      grid_macvlan:
        ipv4_address: 10.30.0.11

  ids_orchestrator_2:
    build:
      context: .
    command: ['/app/scripts/ids_dataset_orchestrator.py', '--seed', '227']
    container_name: ids_dataset_orch2
    hostname: ids-orch-2
    volumes:
      - ./dataset_out:/data
    environment:
      IDS_EVENTS_OUT: /data/ids_events_orch2.jsonl
      IDS_SOURCE_IP: 10.30.0.12
      IDS_ATTACKER_ID: orch2
      IDS_ORCH_PLC1: 10.30.0.3:5020
      IDS_ORCH_PLC2: 10.30.0.5:5020
      IDS_MODBUS_UNIT: "0"
      IDS_MIN_GAP_SEC: "55"
      IDS_MAX_GAP_SEC: "260"
      IDS_ATTACK_PROB: "0.60"
      IDS_BENIGN_EXTRA_MAX: "240"
      IDS_BENIGN_EP_PROB: "0.55"
      IDS_BENIGN_EP_MAX_PER_GAP: "1"
    restart: unless-stopped
    networks:
      grid_macvlan:
        ipv4_address: 10.30.0.12

  ids_orchestrator_3:
    build:
      context: .
    command: ['/app/scripts/ids_dataset_orchestrator.py', '--seed', '331']
    container_name: ids_dataset_orch3
    hostname: ids-orch-3
    volumes:
      - ./dataset_out:/data
    environment:
      IDS_EVENTS_OUT: /data/ids_events_orch3.jsonl
      IDS_SOURCE_IP: 10.30.0.13
      IDS_ATTACKER_ID: orch3
      IDS_ORCH_PLC1: 10.30.0.3:5020
      IDS_ORCH_PLC2: 10.30.0.5:5020
      IDS_MODBUS_UNIT: "0"
      IDS_MIN_GAP_SEC: "65"
      IDS_MAX_GAP_SEC: "280"
      IDS_ATTACK_PROB: "0.60"
      IDS_BENIGN_EXTRA_MAX: "240"
      IDS_BENIGN_EP_PROB: "0.50"
      IDS_BENIGN_EP_MAX_PER_GAP: "1"
    restart: unless-stopped
    networks:
      grid_macvlan:
        ipv4_address: 10.30.0.13

# ---------------------------------------------------------
# Network Configuration (CRITICAL STEP)
# ---------------------------------------------------------
networks:
  grid_macvlan:
    driver: macvlan
    driver_opts:
      parent: ens18
    ipam:
      config:
        - subnet: "10.30.0.0/24"
          gateway: "10.30.0.254"
          ip_range: "10.30.0.192/30"
