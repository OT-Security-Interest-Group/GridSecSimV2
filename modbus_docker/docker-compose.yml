services:
  # ---------------------------------------------------------
  # SCADA Masters (The Client polling the network)
  # ---------------------------------------------------------
  scada_master:
    build:
      context: .
      args:
        SCRIPT_NAME: scada_master.py
    command: ['/app/scripts/scada_master.py', '--target', '10.30.0.3:5020']
    container_name: scada1
    networks:
      grid_macvlan:
        ipv4_address: 10.30.0.8  # Assign a static IP on your physical subnet

  scada2:
    build:
      context: .
      args:
        SCRIPT_NAME: scada_master.py
    command: ['/app/scripts/scada_master.py', '--target', ' 10.30.0.3:5020']
    container_name: scada2
    networks: 
      grid_macvlan:
        ipv4_address: 10.30.0.17

  scada3:
    build:
      context: .
      args:
        SCRIPT_NAME: scada_master.py
    command: ['/app/scripts/scada_master.py', '--target', ' 10.30.0.3:5020']
    container_name: scada3
    networks:
      grid_macvlan:
        ipv4_address: 10.30.0.32

  # ---------------------------------------------------------
  # Historian Loggers
  # ---------------------------------------------------------
  historian_logger:
    build:
      context: .
      args:
        SCRIPT_NAME: historian_logger.py
    command: ['/app/scripts/historian_logger.py', '--target', '10.30.0.3:5020']
    container_name: historian_logger1
    networks:
      grid_macvlan:
        ipv4_address: 10.30.0.10

  historian_logger2:
    build:
      context: .
      args:
        SCRIPT_NAME: historian_logger.py
    command: ['/app/scripts/historian_logger.py', '--target', '10.30.0.3:5020']
    container_name: historian_logger2
    networks:
      grid_macvlan:
        ipv4_address: 10.30.0.33

  historian_logger3:
    build:
      context: .
      args:
        SCRIPT_NAME: historian_logger.py
    command: ['/app/scripts/historian_logger.py', '--target', '10.30.0.3:5020']
    container_name: historian_logger3
    networks:
      grid_macvlan:
        ipv4_address: 10.30.0.49


# ---------------------------------------------------------
# Network Configuration (CRITICAL STEP)
# ---------------------------------------------------------
networks:
  grid_macvlan:
    driver: macvlan
    driver_opts:
      # VM's primary interface facing pfSense
      parent: ens18
    ipam:
      config:
        - subnet: "10.30.0.0/24"     # physical network subnet
          gateway: "10.30.0.254"       # pfSense IP address
          ip_range: "10.30.0.192/30"
